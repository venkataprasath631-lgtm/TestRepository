name: Build WAR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create WAR file
        run: |
          jar -cvf myapp.war *

      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: myapp.war
